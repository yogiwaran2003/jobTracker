spring.application.name=job-tracker-backend
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:jobtrackerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow cross-origin requests from the React frontend
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Gemini AI API Key
# It is recommended to set this as an environment variable: GEMINI_API_KEY
gemini.api.key=${GEMINI_API_KEY:AIzaSyDCGdAT7PZfS50K6TdTqxFMerHXQbnhYCw}
